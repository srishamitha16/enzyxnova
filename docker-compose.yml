version: '3.9'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: enzyxnova
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    container_name: enzyxnova-backend
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - API_KEY_HEADER_NAME=${API_KEY_HEADER_NAME}
      - BACKEND_ALLOW_ORIGINS=${BACKEND_ALLOW_ORIGINS}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - ENVIRONMENT=${ENVIRONMENT}
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
    dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  db-data:
